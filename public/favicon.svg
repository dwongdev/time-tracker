<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Sun rays - warm orange that works on both light and dark backgrounds -->
  <g stroke="#e8922e" stroke-width="5.5" stroke-linecap="round">
    <line x1="50" y1="5" x2="50" y2="18"/>
    <line x1="50" y1="82" x2="50" y2="95"/>
    <line x1="5" y1="50" x2="18" y2="50"/>
    <line x1="82" y1="50" x2="95" y2="50"/>
    <line x1="18.2" y1="18.2" x2="27.4" y2="27.4"/>
    <line x1="72.6" y1="72.6" x2="81.8" y2="81.8"/>
    <line x1="18.2" y1="81.8" x2="27.4" y2="72.6"/>
    <line x1="72.6" y1="27.4" x2="81.8" y2="18.2"/>
    <line x1="10" y1="33" x2="21.5" y2="37.5"/>
    <line x1="78.5" y1="62.5" x2="90" y2="67"/>
    <line x1="33" y1="10" x2="37.5" y2="21.5"/>
    <line x1="62.5" y1="78.5" x2="67" y2="90"/>
    <line x1="67" y1="10" x2="62.5" y2="21.5"/>
    <line x1="37.5" y1="78.5" x2="33" y2="90"/>
    <line x1="90" y1="33" x2="78.5" y2="37.5"/>
    <line x1="21.5" y1="62.5" x2="10" y2="67"/>
